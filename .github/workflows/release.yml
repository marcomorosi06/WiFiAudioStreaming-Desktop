name: Desktop Multi-Platform Build

on:
  push:
    tags:
      - 'v*'
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

# Ensure only one build workflow runs at a time for the same reference
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile and package the desktop applications across OS platforms
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}

    # Minimal token permissions for the job. Everything not defined here is dropped
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Set up Java 17 using updated core actions
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      # Establish isolated Gradle build environment with security validation
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: true # Verifies integrity of the wrapper file to prevent malicious dependency injection
          cache-provider: basic   # Abides by standard open-source caching rules
          # Prevents cache poisoning if workflow ever runs on external/forked PR contexts
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      # Native audio engine is built from source via CMake; ensure a toolchain on Linux
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      # Windows: nessun installer, solo l'app impacchettata. Le altre piattaforme
      # producono anche i formati nativi (dmg / deb / rpm).
      - name: Build Packages (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew createReleaseDistributable packagePortableArchives

      - name: Build Packages (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./gradlew createReleaseDistributable packageDistributionForCurrentOS packagePortableArchives

      # Build a portable AppImage from the unpacked distributable (Linux only)
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -e
          export APPIMAGE_EXTRACT_AND_RUN=1
          APP_VER="$(cat build/display-version.txt 2>/dev/null || true)"
          if [ -z "$APP_VER" ]; then APP_VER="${GITHUB_REF_NAME#v}"; fi
          if [ -z "$APP_VER" ]; then APP_VER="dev"; fi
          OUT="build/packages"; mkdir -p "$OUT"
          APPDIR="$RUNNER_TEMP/AppDir"; rm -rf "$APPDIR"; mkdir -p "$APPDIR"

          # Copy the unpacked app (folder name resolved dynamically)
          APP_SRC="$(find build/compose/binaries/main-release/app -maxdepth 1 -mindepth 1 -type d | head -n1)"
          cp -r "$APP_SRC/." "$APPDIR/"
          LAUNCHER_NAME="$(ls "$APPDIR/bin" | head -n1)"

          # Icon
          cp src/main/resources/app_icon.png "$APPDIR/wifi-audio-streaming.png"
          cp src/main/resources/app_icon.png "$APPDIR/.DirIcon"

          # Desktop entry
          cat > "$APPDIR/wifi-audio-streaming.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=WiFi Audio Streaming
          Exec=AppRun
          Icon=wifi-audio-streaming
          Categories=AudioVideo;
          Terminal=false
          EOF

          # AppRun launcher
          cat > "$APPDIR/AppRun" <<EOF
          #!/bin/sh
          HERE="\$(dirname "\$(readlink -f "\$0")")"
          exec "\$HERE/bin/$LAUNCHER_NAME" "\$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          # Pick appimagetool for the runner architecture
          case "$(uname -m)" in
            aarch64|arm64) AITARCH=aarch64 ;;
            *) AITARCH=x86_64 ;;
          esac
          curl -fL -o appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${AITARCH}.AppImage"
          chmod +x appimagetool
          ARCH=$AITARCH ./appimagetool "$APPDIR" "$OUT/WiFi-Audio-Streaming-${APP_VER}-linux-${AITARCH}.AppImage"

      - name: Build standalone .exe (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -e
          APP_VER="$(cat build/display-version.txt 2>/dev/null || true)"
          if [ -z "$APP_VER" ]; then APP_VER="${GITHUB_REF_NAME#v}"; fi
          if [ -z "$APP_VER" ]; then APP_VER="dev"; fi
          OUT="build/packages"; mkdir -p "$OUT"

          APP_SRC="$(find build/compose/binaries/main-release/app -maxdepth 1 -mindepth 1 -type d | head -n1)"
          echo "app-image: $APP_SRC"
          LAUNCHER="$(ls "$APP_SRC"/*.exe 2>/dev/null | head -n1 | xargs -I{} basename {})"
          echo "launcher: $LAUNCHER"

          curl -fL -o lzmasdk.7z "https://www.7-zip.org/a/lzma2301.7z"
          7z x lzmasdk.7z -olzmasdk -y > /dev/null

          ( cd "$APP_SRC" && 7z a -t7z -mx=7 "$GITHUB_WORKSPACE/payload.7z" . > /dev/null )

          printf ';!@Install@!UTF-8!\r\nRunProgram="\\"%%%%T\\\\bin\\\\%s\\""\r\nGUIMode="2"\r\n;!@InstallEnd@!\r\n' "$LAUNCHER" > sfx_config.txt
          cat sfx_config.txt

          SFX_MODULE="$(find lzmasdk -iname '7zSD.sfx' | head -n1)"
          cat "$SFX_MODULE" sfx_config.txt payload.7z > "$OUT/WiFi-Audio-Streaming-${APP_VER}-windows-x64.exe"
          ls -la "$OUT"

      - name: Rename dmg per architecture (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -e
          APP_VER="$(cat build/display-version.txt 2>/dev/null || true)"
          if [ -z "$APP_VER" ]; then APP_VER="${GITHUB_REF_NAME#v}"; fi
          if [ -z "$APP_VER" ]; then APP_VER="dev"; fi
          case "$(uname -m)" in
            arm64|aarch64) MACARCH=arm64 ;;
            *) MACARCH=x64 ;;
          esac
          DMG_DIR="build/compose/binaries/main/dmg"
          for f in "$DMG_DIR"/*.dmg; do
            [ -e "$f" ] || continue
            mv "$f" "$DMG_DIR/WiFi-Audio-Streaming-${APP_VER}-macos-${MACARCH}.dmg"
          done
          ls -la "$DMG_DIR"

      # Upload built binaries as artifacts for later use in the release job
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-artifacts-${{ matrix.os }}
          path: |
            build/compose/binaries/main/deb/*.deb
            build/compose/binaries/main/rpm/*.rpm
            build/compose/binaries/main/dmg/*.dmg
            build/packages/*.zip
            build/packages/*.tar.gz
            build/packages/*.AppImage
            build/packages/*.exe
          retention-days: 30
          if-no-files-found: ignore # Matrix platforms only compile their relative target outputs

  # Download assets, make draft release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ success() && startsWith(github.ref, 'refs/tags/v') }}

    # Explicitly granted scopes required for secure artifact attestation and drafting releases
    permissions:
      contents: write         # Required to construct releases and append assets
      id-token: write         # Required to map OIDC identity tokens for provenance signatures
      attestations: write     # Required to attach the final build provenance claims

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Aggregate the outputs from every matrix configuration into one directory
      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./release-assets
          pattern: desktop-artifacts-*
          merge-multiple: true

      # Generates Sigstore-backed build certificates asserting where and how your desktop binaries were built
      - name: Generate Build Provenance Attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            ./release-assets/**/*.exe
            ./release-assets/**/*.deb
            ./release-assets/**/*.rpm
            ./release-assets/**/*.dmg
            ./release-assets/**/*.zip
            ./release-assets/**/*.tar.gz
            ./release-assets/**/*.AppImage

      # Create Draft release
      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          # Turn on recursive globbing for this shell execution
          shopt -s globstar

          gh release create "${RELEASE_VERSION}" \
            --draft \
            --title "Desktop Release ${RELEASE_VERSION}" \
            --generate-notes \
            ./release-assets/**/*.*
