vcable_help_button=Need help setting this up?
vcable_help_win_title=Windows — VB-CABLE Setup
vcable_help_win_1=Go to vb-audio.com/Cable and download VB-CABLE.
vcable_help_win_2=Run the installer as Administrator, then restart your PC.
vcable_help_win_3=After restarting, "CABLE Input" will appear in the dropdown above — select it.
vcable_help_win_4=In Discord, Zoom or any other app, go to Audio Settings and choose "CABLE Output" as the microphone.
vcable_help_win_5=Done! The streamed audio will now appear as your microphone in those apps.
vcable_help_win_link=Open vb-audio.com/Cable
vcable_help_linux_title=Linux — Automatic Virtual Sink
vcable_help_linux_1=No installation needed. When streaming starts, a virtual sink called "WFAS_VirtualMic" is created automatically via pactl.
vcable_help_linux_2=Open pavucontrol (PulseAudio Volume Control) or a PipeWire equivalent.
vcable_help_linux_3=In the "Recording" tab, set Discord/Zoom/etc. to capture from "WFAS_VirtualMic".
vcable_help_linux_4=The streamed audio will now appear as a microphone in those apps.
vcable_help_linux_link=Install pavucontrol
vcable_help_mac_title=macOS — BlackHole Setup
vcable_help_mac_1=Download BlackHole (free, open source) from github.com/ExistentialAudio/BlackHole.
vcable_help_mac_2=Install it following the on-screen instructions. No restart needed.
vcable_help_mac_3=Select "BlackHole 2ch" (or 16ch) in the dropdown above.
vcable_help_mac_4=In System Settings → Sound, you can optionally create a Multi-Output Device to hear the audio and route it simultaneously.
vcable_help_mac_5=In Discord, Zoom or any other app, choose "BlackHole 2ch" as the microphone.
vcable_help_mac_link=Open BlackHole on GitHub
