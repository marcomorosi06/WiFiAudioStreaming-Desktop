vcable_help_button=Hai bisogno di aiuto per configurarlo?
vcable_help_win_title=Windows \u2014 Configurazione VB-CABLE
vcable_help_win_1=Vai su vb-audio.com/Cable e scarica VB-CABLE.
vcable_help_win_2=Esegui l'installer come Amministratore, poi riavvia il PC.
vcable_help_win_3=Dopo il riavvio, "CABLE Input" apparir\u00e0 nel men\u00f9 a tendina sopra. Selezionalo.
vcable_help_win_4=In Discord, Zoom o qualsiasi altra app, vai nelle impostazioni audio e scegli "CABLE Output" come microfono.
vcable_help_win_5=Fatto! L'audio in streaming apparir\u00e0 come microfono in quelle app.
vcable_help_win_link=Apri vb-audio.com/Cable
vcable_help_linux_title=Linux \u2014 Sink Virtuale Automatico
vcable_help_linux_1=Nessuna installazione necessaria. Quando la stream parte, un sink virtuale chiamato "WFAS_VirtualMic" viene creato automaticamente tramite pactl.
vcable_help_linux_2=Apri pavucontrol (PulseAudio Volume Control) o un equivalente PipeWire.
vcable_help_linux_3=Nella scheda "Registrazione", imposta Discord/Zoom/ecc. per catturare da "WFAS_VirtualMic".
vcable_help_linux_4=L'audio in streaming apparir\u00e0 come microfono in quelle app.
vcable_help_linux_link=Installa pavucontrol
vcable_help_mac_title=macOS \u2014 Configurazione BlackHole
vcable_help_mac_1=Scarica BlackHole (gratuito, open source) da github.com/ExistentialAudio/BlackHole.
vcable_help_mac_2=Installalo seguendo le istruzioni. Nessun riavvio necessario.
vcable_help_mac_3=Seleziona "BlackHole 2ch" (o 16ch) nel men\u00f9 a tendina sopra.
vcable_help_mac_4=In Impostazioni di Sistema \u2192 Suono, puoi creare un Dispositivo Multi-Output per ascoltare e instradare l'audio contemporaneamente.
vcable_help_mac_5=In Discord, Zoom o qualsiasi altra app, scegli "BlackHole 2ch" come microfono.
vcable_help_mac_link=Apri BlackHole su GitHub
start_minimized_tray=Avvio nascosto nella tray
start_minimized_tray_desc=Avvia l'app nascosta nella tray di sistema. Unito ad "Avvio con il sistema" si comporta come AirPlay/Chromecast: sempre pronta, mai d'intralcio.
close_to_tray=Chiudi nella tray
close_to_tray_desc=Quando chiudi la finestra, l'app viene minimizzata nella tray invece di terminare. Fai click destro sull'icona per uscire davvero.
tray_show_window=Mostra finestra
tray_hide_window=Nascondi nella tray
tray_quit=Esci
tray_running_in_background=L'app \u00e8 in esecuzione in background. Click destro sull'icona per uscire.
